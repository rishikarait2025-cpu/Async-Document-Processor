services:
  postgres:
    image: postgres:16
    container_name: document_postgres
    restart: always
    environment:
      POSTGRES_DB: document_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: document_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: