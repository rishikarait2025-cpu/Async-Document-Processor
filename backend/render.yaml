services:
  - type: web
    name: async-document-processor
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: DATABASE_URL
        value: your_postgres_url
      - key: REDIS_URL
        value: your_redis_url